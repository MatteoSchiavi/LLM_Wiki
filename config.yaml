# ── Vault ────────────────────────────────────────────────────────────────────
# Your Obsidian vault. All wiki pages are .md files here.
vault_dir: "D:\\obsidian\\LLM_Wiki"

# Temp dir for uploads (auto-cleaned after processing)
uploads_tmp: ".tmp_uploads"

# SQLite job state (now using aiosqlite)
db_path: ".state/jobs.db"

# ── Ollama ───────────────────────────────────────────────────────────────────
ollama_url: "http://localhost:11434"

# Vision model for OCR (requires glm-ocr:latest pulled in Ollama)
ocr_model: "glm-ocr:latest"

# Text model for wiki enrichment and query
llm_model: "qwen2.5:7b-instruct"

# ── OCR ──────────────────────────────────────────────────────────────────────
ocr:
  max_concurrency: 2
  dpi: 200
  max_image_dimension: 1800
  # keep_alive during OCR loop (model stays loaded across pages)
  keep_alive_during: "5m"

# ── Wiki ─────────────────────────────────────────────────────────────────────
wiki:
  max_source_chars: 16000
  context_pages: 6
  auto_create_entities: true
  auto_create_concepts: true
  max_entity_pages: 3
  max_concept_pages: 3
  # Chunk size for hierarchical token management (chars per chunk)
  chunk_size: 14000
  # Overlap between chunks (chars) for boundary context
  chunk_overlap: 200
  # Seconds to keep LLM model loaded after use
  keep_alive: 300

# ── Categories ───────────────────────────────────────────────────────────────
# These are created ON DEMAND when a document is categorized into them
categories:
  - name: "AI & Machine Learning"
    slug: "ai-ml"
    keywords: ["machine learning", "deep learning", "neural network", "NLP",
               "computer vision", "transformer", "LLM", "GPT", "BERT",
               "artificial intelligence", "reinforcement learning", "GAN",
               "diffusion model", "RAG", "fine-tuning"]

  - name: "Science & Research"
    slug: "science"
    keywords: ["physics", "chemistry", "biology", "mathematics", "quantum",
               "research", "experiment", "hypothesis", "theorem", "proof",
               "scientific", "journal", "paper", "study"]

  - name: "Technology"
    slug: "technology"
    keywords: ["software", "hardware", "programming", "web", "system",
               "API", "database", "cloud", "DevOps", "framework",
               "programming language", "algorithm", "architecture"]

  - name: "Health & Medicine"
    slug: "health"
    keywords: ["medical", "medicine", "nutrition", "fitness", "mental health",
               "clinical", "disease", "treatment", "diagnosis", "therapy"]

  - name: "Business & Finance"
    slug: "business"
    keywords: ["economics", "management", "investing", "startup", "market",
               "finance", "accounting", "business", "corporate", "strategy"]

  - name: "Philosophy & Psychology"
    slug: "philosophy"
    keywords: ["ethics", "consciousness", "behavior", "cognition", "philosophy",
               "psychology", "mind", "perception", "logic", "metaphysics"]

  - name: "Arts & Humanities"
    slug: "arts"
    keywords: ["history", "literature", "art", "music", "culture", "language",
               "anthropology", "sociology", "creative", "design"]

  - name: "Personal"
    slug: "personal"
    keywords: ["personal", "journal", "diary", "notes", "reflection",
               "goals", "habits", "learning"]

# ── Folder Watcher ────────────────────────────────────────────────────────────
# When enabled, any file dropped into the watch_folder is automatically
# processed through the pipeline.
#
# SMART ROUTING:
#   PDFs/Images  -> OCR (glm-ocr) then Qwen
#   Audio        -> Whisper transcription then Qwen
#   Text/Code    -> Skip OCR entirely, go directly to Qwen
#   (.txt, .md, .csv, .json, .html, .py, .js, .yaml, etc.)

watch_enabled: true
watch_folder: "D:\\obsidian\\LLM_Wiki_inbox"
watch_debounce_sec: 2.0    # seconds to wait for file to stabilize after write
watch_poll_sec: 1.0        # how often to check if file is still being written

# ── Search ───────────────────────────────────────────────────────────────────
search:
  k1: 1.5
  b: 0.75

# ── Server ───────────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 7337
  health_check_interval: 60
